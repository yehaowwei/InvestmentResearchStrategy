server:
  address: 0.0.0.0
  port: 28637

spring:
  application:
    name: strategy-dashboard-engine
  datasource:
    url: ${STRATEGY_DB_URL:jdbc:mysql://localhost:3306/strategy_dashboard?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true}
    username: ${STRATEGY_DB_USERNAME:root}
    password: ${STRATEGY_DB_PASSWORD:root}
    driver-class-name: ${STRATEGY_DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jackson:
    default-property-inclusion: non_null
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations:
        - classpath:db/schema-mysql.sql
        - classpath:db/schema-image-extracted.sql
      data-locations:
        - classpath:db/data-mysql.sql
        - classpath:db/data-image-extracted.sql

strategy-ai:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: https://api.deepseek.com
    model: deepseek-chat
