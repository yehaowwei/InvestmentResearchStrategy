server:
  address: 0.0.0.0
  port: 28637

spring:
  application:
    name: bi-dashboard-engine
  datasource:
    url: ${BI_DB_URL:jdbc:h2:file:./data/bi-demo;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
    username: ${BI_DB_USERNAME:sa}
    password: ${BI_DB_PASSWORD:}
    driver-class-name: ${BI_DB_DRIVER:org.h2.Driver}
  jackson:
    default-property-inclusion: non_null
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:sql/schema.sql
      data-locations: classpath:sql/demo-seed.sql,classpath:sql/volatility-tracking-data.sql,classpath:sql/sales-report-data.sql
